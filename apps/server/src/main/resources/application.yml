server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: love-travel-server
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/love_travel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 60MB

love-travel:
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://127.0.0.1:3000,http://localhost:3000}
  auth:
    session-secret: ${LOVE_TRAVEL_SESSION_SECRET:dev-love-travel-session-secret-change-me}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
    signed-url-expire-minutes: ${ALIYUN_OSS_SIGNED_URL_EXPIRE_MINUTES:10}
